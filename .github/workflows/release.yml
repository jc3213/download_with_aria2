name: extension-release

on:
  push:
    branches:
      - main
    paths:
      - 'chromium/manifest.json'
      - 'chromium_mv3/manifest.json'
      - 'firefox/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-extensions:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Install Zip Tool
        run: sudo apt-get install -y zip jq

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Minify Tools
        run: npm install -g html-minifier-terser terser clean-css-cli

      - name: 🏷️ Generate Release Version
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]' | tr -d '[-_]')

          MV2_VER=$(jq -r .version chromium/manifest.json)
          MV3_VER=$(jq -r .version chromium_mv3/manifest.json)
          FF_VER=$(jq -r .version firefox/manifest.json)
          VERSION=$(printf "%s\n%s\n%s" "$MV2_VER" "$MV3_VER" "$FF_VER" | sort -V | tail -n 1)

          echo "MV2_ZIP=$NAME-chromium-$MV2_VER.zip" >> $GITHUB_ENV
          echo "MV3_ZIP=$NAME-chromium_mv3-$MV3_VER.zip" >> $GITHUB_ENV
          echo "FF_ZIP=$NAME-firefox_$FF_VER.zip" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: ✨ Minify Source Files
        run: |
          minify_dir() {
            DIR=$1
            find "$DIR" -type f -name "*.html" -exec html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
            find "$DIR" -type f -name "*.js"   -exec terser --compress --mangle -o {} -- {} \;
            find "$DIR" -type f -name "*.css"  -exec cleancss -o {} {} \;
            find "$DIR" -type f -name "*.json" -exec node -e 'const fs=require("fs"); const f=process.argv[1]; const j=JSON.parse(fs.readFileSync(f,"utf8")); fs.writeFileSync(f, JSON.stringify(j));' {} \;
          }

          minify_dir chromium
          minify_dir chromium_mv3
          minify_dir firefox

      - name: 📦 Package Extensions
        run: |
          package() {
            BASE="$1"
            APP="$2"
            OUT="$3"
            ZIP="$4"

            mkdir -p "$OUT"
            cp -r "$BASE"/* "$OUT/"
            [ -n "$APP" ] && cp -r "$APP"/* "$OUT/"
            cd "$OUT"
            zip -r "../$ZIP" .
            cd ..
            rm -rf "$OUT"
          }

          package "chromium" "" "build_mv2" "${MV2_ZIP}"
          package "chromium" "chromium_mv3" "build_mv3" "${MV3_ZIP}"
          package "chromium" "firefox" "build_ff" "${FF_ZIP}"

      - name: 🔍 Check Release Assets
        run: ls -lh *.zip

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "${VERSION}" \
            "${MV2_ZIP}" \
            "${MV3_ZIP}" \
            "${FF_ZIP}" \
            --title "${VERSION}" \
            --notes "Auto-packaged extensions for version v${VERSION}"
