name: extension-release

on:
  push:
    branches:
      - main
    paths:
      - 'chromium/manifest.json'
      - 'chromium_mv3/manifest.json'
      - 'firefox/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-extensions:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Install Zip Tool
        run: sudo apt-get install -y zip jq

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Minify Tools
        run: npm install -g html-minifier-terser terser clean-css-cli

      - name: 🏷️ Generate Release Version
        run: |
          COUNT=$(git rev-list --count HEAD)

          get_version() {
            DIR=$1
            RAW=$(jq -r .version "$DIR/manifest.json")
            NEW="${RAW}.${COUNT}"
            jq --arg v "$NEW" '.version=$v' "$DIR/manifest.json" > tmp && mv tmp "$DIR/manifest.json"
            echo "$NEW"
          }

          MV2_VERSION=$(get_version chromium)
          MV3_VERSION=$(get_version chromium_mv3)
          FF_VERSION=$(get_version firefox)
          RELEASE_VERSION=$(printf "%s\n%s\n%s" "$MV2_VERSION" "$MV3_VERSION" "$FF_VERSION" | sort -V | tail -n 1)

          echo "MV2_VERSION=$MV2_VERSION" >> $GITHUB_ENV
          echo "MV3_VERSION=$MV3_VERSION" >> $GITHUB_ENV
          echo "FF_VERSION=$FF_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: ✨ Minify Source Files
        run: |
          minify_dir() {
            DIR=$1
            find "$DIR" -type f -name "*.html" -exec html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
            find "$DIR" -type f -name "*.js"   -exec terser --compress --mangle -o {} -- {} \;
            find "$DIR" -type f -name "*.css"  -exec cleancss -o {} {} \;
            find "$DIR" -type f -name "*.json" -exec node -e 'const fs=require("fs"); const f=process.argv[1]; const j=JSON.parse(fs.readFileSync(f,"utf8")); fs.writeFileSync(f, JSON.stringify(j));' {} \;
          }

          minify_dir chromium
          minify_dir chromium_mv3
          minify_dir firefox

      - name: 📦 Package Extensions
        run: |
          package() {
            SRC1="$1"
            SRC2="$2"
            BUILD_DIR="$3"
            ZIP_NAME="$4"

            mkdir -p "$BUILD_DIR"
            cp -r "$SRC1"/* "$BUILD_DIR/"
            [ -n "$SRC2" ] && cp -r "$SRC2"/* "$BUILD_DIR/"
            cd "$BUILD_DIR"
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf "$BUILD_DIR"
          }

          package "chromium" "" "build_mv2" "chromium-${MV2_VERSION}.zip"
          package "chromium" "chromium_mv3" "build_mv3" "chromium_mv3-${MV3_VERSION}.zip"
          package "chromium" "firefox" "build_firefox" "firefox-${FF_VERSION}.zip"

      - name: 🚀 Create GitHub Release
        run: |
          RAW="${GITHUB_REPOSITORY#*/}"
          NAME=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr -d '-_')

          gh release create "${RELEASE_VERSION}" \
            "${NAME}-chromium-${MV2_VERSION}.zip" \
            "${NAME}-chromium_mv3-${MV3_VERSION}.zip" \
            "${NAME}-firefox-${FF_VERSION}.zip" \
            --title "${RELEASE_VERSION}" \
            --notes "Auto-packaged extensions for version v${RELEASE_VERSION}"
