name: extension-nightly-release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.version.outputs.version }}
      hash: ${{ steps.version.outputs.hash }}
      mv2_zip: ${{ steps.version.outputs.mv2_zip }}
      mv3_zip: ${{ steps.version.outputs.mv3_zip }}
      ff_zip: ${{ steps.version.outputs.ff_zip }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏷️ Generate Version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          REPO="${GITHUB_REPOSITORY#*/}"
          NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]' | tr -d '[-_]')

          get_version() {
            DIR="$1"
            RAW=$(jq -r .version "$DIR/manifest.json")
            NEW="${RAW}.${COUNT}"
            jq --arg v "$NEW" '.version=$v' "$DIR/manifest.json" > tmp && mv tmp "$DIR/manifest.json"
            echo "$NEW"
          }

          MV2_VER=$(get_version chromium)
          MV3_VER=$(get_version chromium_mv3)
          FF_VER=$(get_version firefox)
          VERSION=$(printf "%s\n%s\n%s" "$MV2_VER" "$MV3_VER" "$FF_VER" | sort -V | tail -n 1)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "mv2_zip=$NAME-chromium-$MV2_VER-$HASH.zip" >> $GITHUB_OUTPUT
          echo "mv3_zip=$NAME-chromium_mv3-$MV3_VER-$HASH.zip" >> $GITHUB_OUTPUT
          echo "ff_zip=$NAME-firefox_$FF_VER-$HASH.zip" >> $GITHUB_OUTPUT

      - name: 🛑 Check if Release Exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" --json tagName >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  nightly:
    needs: prepare
    if: needs.prepare.outputs.skip == 'false'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}
      HASH: ${{ needs.prepare.outputs.hash }}
      MV2_ZIP: ${{ needs.prepare.outputs.mv2_zip }}
      MV3_ZIP: ${{ needs.prepare.outputs.mv3_zip }}
      FF_ZIP: ${{ needs.prepare.outputs.ff_zip }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      - name: 🔧 Install Zip Tool
        run: sudo apt-get install -y zip jq

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Minify Tools
        run: npm install -g html-minifier-terser terser clean-css-cli

      - name: ✨ Minify Source Files
        run: |
          minify_dir() {
            DIR=$1
            find "$DIR" -type f -name "*.html" -exec html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
            find "$DIR" -type f -name "*.js"   -exec terser --compress --mangle -o {} -- {} \;
            find "$DIR" -type f -name "*.css"  -exec cleancss -o {} {} \;
            find "$DIR" -type f -name "*.json" -exec node -e 'const fs=require("fs"); const f=process.argv[1]; const j=JSON.parse(fs.readFileSync(f,"utf8")); fs.writeFileSync(f, JSON.stringify(j));' {} \;
          }

          minify_dir chromium
          minify_dir chromium_mv3
          minify_dir firefox

      - name: 📦 Package Extensions
        run: |
          package() {
            BASE="$1"
            APP="$2"
            OUT="$3"
            ZIP="$4"

            mkdir -p "$OUT"
            cp -r "$BASE"/* "$OUT/"
            [ -n "$APP" ] && cp -r "$APP"/* "$OUT/"
            cd "$OUT"
            zip -r "../$ZIP" .
            cd ..
            rm -rf "$OUT"
          }

          package "chromium" "" "build_mv2" "${MV2_ZIP}"
          package "chromium" "chromium_mv3" "build_mv3" "${MV3_ZIP}"
          package "chromium" "firefox" "build_ff" "${FF_ZIP}"

      - name: 🚀 Create GitHub Pre-Release
        run: |
          gh release create "${VERSION}" \
            "${MV2_ZIP}" \
            "${MV3_ZIP}" \
            "${FF_ZIP}" \
            --title "${VERSION}" \
            --notes "Nightly pre-release build based on commit ${HASH}" \
            --prerelease
