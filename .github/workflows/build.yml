name: extension-build-release

on:
  push:
    branches:
      - main
    paths:
      - 'chromium/**'
      - 'chromium_mv3/**'
      - 'firefox/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-script:
    runs-on: ubuntu-latest
    outputs:
      script-path: ${{ steps.write-script.outputs.script-path }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📝 Write build_and_release.sh
        id: write-script
        run: |
          SCRIPT="$RUNNER_TEMP/build_and_release.sh"
          cat > "$SCRIPT" <<'EOF'
          #!/usr/bin/env bash
          set -e
          RELEASE_VERSION=$1
          echo "Building extensions for version: $RELEASE_VERSION"

          minify_dir() {
            DIR=$1
            find "$DIR" -type f -name "*.html" -exec html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
            find "$DIR" -type f -name "*.js"   -exec terser --compress --mangle -o {} -- {} \;
            find "$DIR" -type f -name "*.css"  -exec cleancss -o {} {} \;
            find "$DIR" -type f -name "*.json" -exec node -e 'const fs=require("fs"); const f=process.argv[1]; const j=JSON.parse(fs.readFileSync(f,"utf8")); fs.writeFileSync(f, JSON.stringify(j));' {} \;
          }

          minify_dir chromium
          minify_dir chromium_mv3
          minify_dir firefox

          package() {
            SRC1="$1"
            SRC2="$2"
            BUILD_DIR="$3"
            ZIP_NAME="$4"

            mkdir -p "$BUILD_DIR"
            cp -r "$SRC1"/* "$BUILD_DIR/"
            [ -n "$SRC2" ] && cp -r "$SRC2"/* "$BUILD_DIR/"
            cd "$BUILD_DIR"
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf "$BUILD_DIR"
          }

          package "chromium" "" "build_mv2" "chromium-${RELEASE_VERSION}.zip"
          package "chromium" "chromium_mv3" "build_mv3" "chromium_mv3-${RELEASE_VERSION}.zip"
          package "chromium" "firefox" "build_firefox" "firefox-${RELEASE_VERSION}.zip"

          gh release create "${RELEASE_VERSION}" \
            "chromium-${RELEASE_VERSION}.zip" \
            "chromium_mv3-${RELEASE_VERSION}.zip" \
            "firefox-${RELEASE_VERSION}.zip" \
            --title "v${RELEASE_VERSION}" \
            --notes "Auto-packaged extensions for version v${RELEASE_VERSION}"
          EOF
          chmod +x "$SCRIPT"
          echo "script-path=$SCRIPT" >> $GITHUB_OUTPUT

  release-extensions:
    runs-on: ubuntu-latest
    needs: prepare-script
    if: contains(join(github.event.commits.*.modified), 'manifest.json')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🔧 Install System Tools
        run: sudo apt-get install -y zip jq
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: 🏷️ Get Release Version (manifest.json)
        run: |
          get_version() { jq -r .version "$1/manifest.json"; }
          MV2_VERSION=$(get_version chromium)
          MV3_VERSION=$(get_version chromium_mv3)
          FF_VERSION=$(get_version firefox)
          RELEASE_VERSION=$(printf "%s\n%s\n%s" "$MV2_VERSION" "$MV3_VERSION" "$FF_VERSION" | sort -V | tail -n 1)
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
      - name: 🚀 Run Release Script
        run: ${{ needs.prepare-script.outputs.script-path }} "${RELEASE_VERSION}"

  prerelease-extensions:
    runs-on: ubuntu-latest
    needs: prepare-script
    if: ${{ !contains(join(github.event.commits.*.modified), 'manifest.json') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🔧 Install System Tools
        run: sudo apt-get install -y zip jq
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: 🏷️ Get Pre-Release Version (commit count + hash)
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          RELEASE_VERSION="chromium-nightly-${COUNT}-${HASH}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
      - name: 🚀 Run Pre-Release Script
        run: ${{ needs.prepare-script.outputs.script-path }} "${RELEASE_VERSION}"
