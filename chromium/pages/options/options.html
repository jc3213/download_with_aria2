<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title i18n="addons_options"></title>
        <link rel="stylesheet" href="../common.css">
        <link rel="stylesheet" href="options.css">
    </head>
    <body>
        <div id="menu" class="flex">
            <button i18n="options_save" hotkey="Ctrl+S" disabled></button>
            <button i18n="options_undo" hotkey="Ctrl+Z" disabled></button>
            <button i18n="options_redo" hotkey="Ctrl+Y" disabled></button>
            <div id="version"></div>
            <button i18n="options_import"></button>
            <button i18n="options_export"></button>
            <input type="file">
            <a></a>
        </div>
        <div id="options" class="config">
            <h1>JSON-RPC</h1>
            <div class="flex">
                <div class="flex fl-1" i18n-tips="tips_options_jsonrpc_url">
                    <h4 i18n="options_jsonrpc_url"></h4>
                    <input class="fl-1" name="jsonrpc_url" type="text" placeholder="$$hostname:port/jsonrpc$$">
                </div>
                <div class="flex pad-l" i18n-tips="tips_options_jsonrpc_secret">
                    <h4 i18n="options_jsonrpc_secret"></h4>
                    <input class="fl-1" name="jsonrpc_secret" type="password" placeholder="$$secret$$">
                </div>
            </div>
            <div class="flex pad-u">
                <button id="goto-jsonrpc" i18n="options_aria2"></button>
                <div class="flex pad-l" i18n-tips="tips_options_jsonrpc_retries">
                    <h4 i18n="options_jsonrpc_retries"></h4>
                    <input class="fl-1" name="jsonrpc_retries" type="number" min="-1" max="30" setp="1">
                </div>
                <div class="flex fl-1 pad-l" i18n-tips="tips_options_jsonrpc_timeout">
                    <h4 i18n="options_jsonrpc_timeout"></h4>
                    <input class="fl-1" name="jsonrpc_timeout" type="number" min="3" max="20" step="1">
                    <span i18n="time_second_full"></span>
                </div>
            </div>
            <h1 i18n="options_task_manager"></h1>
            <div class="cfg-item" i18n-tips="tips_options_manager_newtab">
                <input id="manager-newtab" name="manager_newtab" type="checkbox">
                <label for="manager-newtab" i18n="options_manager_newtab"></label>
            </div>
            <div class="cfg-item flex" i18n-tips="tips_options_manager_interval">
                <h4 i18n="options_manager_interval"></h4>
                <input class="fl-1" name="manager_interval" type="number" min="5" max="30" step="1">
                <span i18n="time_second_full"></span>
            </div>
            <h1 i18n="options_context"></h1>
            <div class="cfg-item" i18n-tips="tips_options_ctxmenu_enabled">
                <input id="ctxmenu-enabled" name="ctxmenu_enabled" type="checkbox" data-css>
                <label for="ctxmenu-enabled" i18n="options_ctxmenu_enabled"></label>
            </div>
            <div class="cfg-item e-ctxmenu-enabled" i18n-tips="tips_options_ctxmenu_thisurl">
                <input id="ctxmenu-thisurl" name="ctxmenu_thisurl" type="checkbox">
                <label for="ctxmenu-thisurl" i18n="ctxmenu_thisurl"></label>
            </div>
            <div class="cfg-item e-ctxmenu-enabled" i18n-tips="tips_options_ctxmenu_cascade">
                <input id="ctxmenu-cascade" name="ctxmenu_cascade" type="checkbox">
                <label for="ctxmenu-cascade" i18n="options_ctxmenu_cascade"></label>
            </div>
            <div class="cfg-item e-ctxmenu-enabled" i18n-tips="tips_options_ctxmenu_thisimage">
                <input id="ctxmenu-thisimage" name="ctxmenu_thisimage" type="checkbox">
                <label for="ctxmenu-thisimage" i18n="ctxmenu_thisimage"></label>
            </div>
            <div class="cfg-item cfg-right e-ctxmenu-enabled" i18n-tips="tips_options_ctxmenu_allimages">
                <input id="ctxmenu-allimages" name="ctxmenu_allimages" type="checkbox">
                <label for="ctxmenu-allimages" i18n="ctxmenu_allimages"></label>
            </div>
            <h1 i18n="options_notification"></h1>
            <div class="cfg-item" i18n-tips="tips_options_notify_start">
                <input id="notify-start" name="notify_start" type="checkbox">
                <label for="notify-start" i18n="options_notify_start"></label>
            </div>
            <div class="cfg-item" i18n-tips="tips_options_notify_complete">
                <input id="notify-complete" name="notify_complete" type="checkbox">
                <label for="notify-complete" i18n="options_notify_complete"></label>
            </div>
            <h1 i18n="options_folder"></h1>
            <div class="cfg-item" i18n-tips="tips_options_folder_enabled">
                <input id="folder-enabled" name="folder_enabled" type="checkbox" data-css>
                <label for="folder-enabled" i18n="options_folder_enabled"></label>
            </div>
            <div class="cfg-item e-firefox e-folder-enabled e-capture-enabled x-capture-webrequest" i18n-tips="tips_options_folder_firefox">
                <input id="folder-firefox" name="folder_firefox" type="checkbox" data-css>
                <label for="folder-firefox" i18n="options_folder_firefox"></label>
            </div>
            <div class="pad-u e-folder-enabled x-folder-firefox" i18n-tips="tips_options_folder">
                <input name="folder_defined" type="text">
            </div>
            <div id="folder-associate" class="flexmenu e-capture-enabled" i18n-tips="tips_options_file_types">
                <h4 i18n="options_file_types_title"></h4>
                <button id="add-file-type" i18n-tips="tips_add_file_type">➕ Add File Type</button>
                <div class="list list-l"></div>
                <div class="modal hidden">
                    <h3 i18n="options_file_types_title"></h3>
                    <input type="text" id="file-type-name" placeholder="Type name">
                    <input type="text" id="file-type-extensions" placeholder="Extensions (comma separated)">
                    <div class="modal-menu">
                        <button id="save-file-type" i18n="options_save" i18n-tips="tips_save_file_type"></button>
                        <button id="cancel-file-type" i18n="options_cancel" i18n-tips="tips_cancel_file_type"></button>
                    </div>
                </div>
            </div>
            <h1 i18n="options_headers"></h1>
            <div class="cfg-item" i18n-tips="tips_options_headers_override">
                <input id="headers-override" name="headers_override" type="checkbox" data-css>
                <label for="headers-override" i18n="options_headers_override"></label>
            </div>
            <div class="cfg-item e-headers-override" i18n-tips="tips_options_headers_useragent">
                <input name="headers_useragent" type="text">
            </div>
            <div id="headers_hosts" class="flexmenu" i18n-tips="tips_options_headers_hosts">
                <h4 i18n="options_match_exclude"></h4>
                <input type="text">
                <button i18n-tips="tips_match_add">➕</button>
                <button i18n-tips="tips_match_resort">🧲</button>
                <div class="list"></div>
            </div>
            <h1 i18n="options_proxy"></h1>
            <div i18n-tips="tips_options_proxy">
                <input name="proxy_server" type="text" placeholder="http://127.0.0.1:1280/">
            </div>
            <div id="proxy_hosts" class="flexmenu" i18n-tips="tips_options_proxy_hosts">
                <h4 i18n="options_match_include"></h4>
                <input type="text">
                <button i18n-tips="tips_match_add">➕</button>
                <button i18n-tips="tips_match_resort">🧲</button>
                <div class="list"></div>
            </div>
            <h1 i18n="options_capture"></h1>
            <div class="cfg-item" i18n-tips="tips_options_capture_enabled">
                <input id="capture-enabled" name="capture_enabled" type="checkbox" data-css>
                <label for="capture-enabled" i18n="options_capture_enabled"></label>
            </div>
            <div class="cfg-item e-firefox e-capture-enabled" i18n-tips="tips_options_capture_webrequest">
                <input id="capture-webrequest" name="capture_webrequest" type="checkbox" data-css>
                <label for="capture-webrequest" i18n="options_capture_webrequest"></label>
            </div>
            <div id="capture_hosts" class="flexmenu e-capture-enabled" i18n-tips="tips_options_capture_hosts">
                <h4 i18n="options_match_exclude"></h4>
                <input type="text">
                <button i18n-tips="tips_match_add">➕</button>
                <button i18n-tips="tips_match_resort">🧲</button>
                <div class="list"></div>
            </div>
        </div>
        <div id="jsonrpc" class="config">
            <h1 i18n="aria2_options"></h1>
            <div class="cfg-item pad-u">
                <button id="goto-options" i18n="options_back"></button>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_down_dir">
                <h4 i18n="aria2_down_dir"></h4>
                <input name="dir" type="text">
                <i class="sample" title="&quot;C:\Aria2\Download&quot; (Windows)&#10;&#10;&quot;/home/aria2/download&quot; (Linux)"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_file_alloc">
                <h4 i18n="aria2_file_alloc"></h4>
                <select name="file-allocation">
                    <option value="none" i18n="options_disabled"></option>
                    <option value="prealloc" i18n="aria2_alloc_pre"></option>
                    <option value="falloc" i18n="aria2_alloc_fast"></option>
                    <option value="trunc" i18n="aria2_alloc_trunc"></option>
                </select>
                <i class="default" i18n="aria2_alloc_pre"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_disk_cache">
                <h4 i18n="aria2_disk_cache"></h4>
                <div>
                    <input name="disk-cache" type="text">
                    <span>B</span>
                </div>
                <i class="default">16M</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_overwrite">
                <h4 i18n="aria2_overwrite"></h4>
                <select name="allow-overwrite">
                    <option value="true" i18n="aria2_true"></option>
                    <option value="false" i18n="aria2_false"></option>
                </select>
                <i class="default" i18n="aria2_false"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_max_concurrent">
                <h4 i18n="aria2_max_concurrent"></h4>
                <input name="max-concurrent-downloads" type="number">
                <i class="default">5</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_max_download">
                <h4 i18n="aria2_max_download"></h4>
                <div>
                    <input name="max-overall-download-limit" type="text">
                    <span>B/s</span>
                </div>
                <i class="disabled">0</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_max_upload">
                <h4 i18n="aria2_max_upload"></h4>
                <div>
                    <input name="max-overall-upload-limit" type="text">
                    <span>B/s</span>
                </div>
                <i class="disabled">0</i>
            </div>
            <h1>HTTP/FTP</h1>
            <div class="cfg-item" i18n-tips="tips_aria2_http_retry">
                <h4 i18n="aria2_http_retry"></h4>
                <input name="max-tries" type="number">
                <i class="default">5</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_http_wait">
                <h4 i18n="aria2_http_wait"></h4>
                <div>
                    <input name="retry-wait" type="number">
                    <span i18n="time_second_full"></span>
                </div>
                <i class="default">0</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_http_split">
                <h4 i18n="aria2_http_split"></h4>
                <input name="split" type="number">
                <i class="default">5</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_http_size">
                <h4 i18n="aria2_http_size"></h4>
                <div>
                    <input name="min-split-size" type="text">
                    <span>B</span>
                </div>
                <i class="default">20M</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_http_connection">
                <h4 i18n="aria2_http_connection"></h4>
                <input name="max-connection-per-server" type="number">
                <i class="default">1</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_http_ua">
                <h4 i18n="aria2_http_ua"></h4>
                <input name="user-agent" type="text">
                <i id="useragent" class="default"></i>
            </div>
            <h1>BitTorrent</h1>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_port">
                <h4 i18n="aria2_bt_port"></h4>
                <input name="listen-port" type="text">
                <i class="default">6881-6999</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_peers">
                <h4 i18n="aria2_bt_peers"></h4>
                <input name="bt-max-peers" type="number">
                <i class="default">55</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_dht">
                <h4 i18n="aria2_bt_dht"></h4>
                <select name="enable-dht">
                    <option value="true" i18n="aria2_true"></option>
                    <option value="false" i18n="aria2_false"></option>
                </select>
                <i class="default" i18n="aria2_true"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_dht6">
                <h4 i18n="aria2_bt_dht6"></h4>
                <select name="enable-dht6">
                    <option value="true" i18n="aria2_true"></option>
                    <option value="false" i18n="aria2_false"></option>
                </select>
                <i class="default" i18n="aria2_false"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_follow">
                <h4 i18n="aria2_bt_follow"></h4>
                <select name="follow-torrent">
                    <option value="true" i18n="aria2_true"></option>
                    <option value="false" i18n="aria2_false"></option>
                </select>
                <i class="default" i18n="aria2_true"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_remove">
                <h4 i18n="aria2_bt_remove"></h4>
                <select name="bt-remove-unselected-file">
                    <option value="true" i18n="aria2_true"></option>
                    <option value="false" i18n="aria2_false"></option>
                </select>
                <i class="default" i18n="aria2_false"></i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_ratio">
                <h4 i18n="aria2_bt_ratio"></h4>
                <input name="seed-ratio" type="number" min="0" step="0.1">
                <i class="default">1.0</i>
            </div>
            <div class="cfg-item" i18n-tips="tips_aria2_bt_seed">
                <h4 i18n="aria2_bt_seed"></h4>
                <div>
                    <input name="seed-time" type="number">
                    <span i18n="time_minute_full"></span>
                </div>
                <i class="default">30</i>
            </div>
        </div>
        <div class="template">
            <div class="rule">
                <div></div>
                <button i18n-tips="tips_match_remove">❌</button>
            </div>
            <div class="assoc">
                <div></div>
                <div></div>
                <button i18n-tips="tips_edit_file_type">✏️</button>
                <button i18n-tips="tips_remove_file_type">❌</button>
            </div>
        </div>
        <script src="../common.js"></script>
        <script src="options.js"></script>
    </body>
</html>
