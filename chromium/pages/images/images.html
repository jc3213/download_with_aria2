<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title i18n="addons_images"></title>
        <link rel="stylesheet" href="../common.css">
        <link rel="stylesheet" href="images.css">
    </head>
    <body>
        <div id="preview"><img></img></div>
        <hr>
        <div id="gallery"></div>
        <hr>
        <div id="menu" class="flex">
            <button i18n="select_all" hotkey="Ctrl+A"></button>
            <button i18n="select_none" hotkey="Ctrl+E"></button>
            <button i18n="select_flip" hotkey="Ctrl+F"></button>
            <button id="reload" i18n="reload_images" hotkey="Ctrl+R; F5"></button>
            <button i18n="common_submit" hotkey="Ctrl+S"></button>
            <button i18n="popup_options" hotkey="Ctrl+Q"></button>
        </div>
        <div id="jsonrpc" class="hidden">
            <div i18n-tips="tips_aria2_down_dir">
                <h4 i18n="aria2_down_dir"></h4>
                <input name="dir" type="text">
            </div>
            <div i18n-tips="tips_task_proxy">
                <h4 i18n="task_proxy"></h4>
                <div class="flexmenu">
                    <input name="all-proxy" type="text">
                    <button id="proxy" i18n-tips="tips_proxy_server">⚡️</button>
                </div>
            </div>
        </div>
        <script src="../common.js"></script>
        <script src="images.js"></script>
    </body>
</html>
